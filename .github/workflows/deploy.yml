name: Deploy Monorepo

on:
  push:
    branches:
      - main # produkce
      - develop # staging

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable & install pnpm (corepack)
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - uses: actions/setup-node@v4
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build apps
        run: pnpm run build

      - name: Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:github-ci

      - name: Archive build
        run: |
          mkdir -p build-output
          # Kopírujeme všechny dist složky (warforum-indexer + workers)
          cp -r apps/warforum-indexer/dist build-output/warforum-indexer
          cp -r apps/workers/*/dist build-output/
          # Kopírujeme všechny .output složky (Nuxt aplikace)
          cp -r apps/*/.output build-output/
          tar czf build.tar.gz build-output

      - name: Deploy to server
        run: |
          scp -o StrictHostKeyChecking=no build.tar.gz deploy@prod-01:~/
          ssh deploy@prod-01 "tar xzf build.tar.gz && rm build.tar.gz"
